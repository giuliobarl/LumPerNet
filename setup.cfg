# Helper file to handle all configs

[flake8]
# Flake8, PyFlakes, etc
per-file-ignores = __init__.py:F401
max-line-length = 120
exclude = .tox,.git
max-doc-length = 140
ignore = E203, E266, E501, W503, F403, F401, E226
docstring-convention=google
extend-select = B950
extend-ignore = E203,E501,E701,I001,I005
